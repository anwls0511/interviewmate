server:
  port: 8080

spring:
  application:
    name: interviewmate

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/interviewmate}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1rkdanwls}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: interviewmate-jwt-secret-key-interviewmate-jwt-secret-key
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

openai:
  api-key: ${OPENAI_API_KEY:test}
  model: gpt-4.1-mini