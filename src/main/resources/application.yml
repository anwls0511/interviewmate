server:
  port: 8080

spring:
  application:
    name: interviewmate

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/interviewmate
    username: root
    password:

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: interviewmate-jwt-secret-key-interviewmate-jwt-secret-key
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000
